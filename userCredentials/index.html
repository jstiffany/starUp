<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>login</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div>
        <img id="startupLogo" src="/userCredentials/usercredImages/starupLogo.png" alt="starUp">

        <div id="userloginForm">

            <form name="loginForm" method="post" netlify>

            <div id="username" class="input">
                <label for="username">username</label>
                <input type="text" name="username" id="username">
            </div>

            <div id="password" class="input">
                <label for="password">password</label>
                <input type="password" name="password" id="password">
            </div>

            <div class="notUser">
                <label for="notUser">not a user? sign up now!</label>
                <button id="signUp"><a href="/signupPage/signup.html">signup</a></button>
            </div>

            <button type="submit">login</button>
            </form>

        </div>
    </div>
</body>
</html>
