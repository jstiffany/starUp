<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>login</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="overallForm">
        <img id="startupLogo" src="/userCredentials/usercredImages/starupLogo.png" alt="starUp">

        <div id="userloginForm">

            <form name="loginForm" method="post" netlify>

            <div id="inputs">
                <div id="username_Holder" class="input">
                    <label for="username">username</label>
                    <input type="text" name="username" id="username">
                </div>

                <div id="password_Holder" class="input">
                    <label for="password">password</label>
                    <input type="password" name="password" id="password">
                </div>
            </div>

                <button type="submit">login</button>
            </form>

        </div>
    </div>
</body>
</html>
