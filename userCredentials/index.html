<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>login</title>

    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div class="overallForm">
        <img id="startupLogo" src="/userCredentials/usercredImages/starupLogo.png" alt="starUp">

        <div id="userloginForm">

            <form name="loginForm"
            method="post"
            netlify
            data-netlify-recaptcha="true">

            <div id="inputs">
                <div id="username_Holder" class="input">
                    <label for="username">username</label>
                    <input type="text" name="username" id="username" required>
                </div>

                <div id="password_Holder" class="input">
                    <label for="password">password</label>
                    <input type="password" name="password" id="password" required>
                </div>
            </div>
            <div class="bottomButtons">
                <a href="signup.html">not a member? signup</a>
                <button type="submit">login</button>
            </div>
            </form>

        </div>
    </div>
</body>
</html>
