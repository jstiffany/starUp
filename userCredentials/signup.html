<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>login</title>

    <link rel="stylesheet" href="signup.css">
</head>
<body>
    <div class="overallForm">
        <img id="startupLogo" src="/userCredentials/usercredImages/starupLogo.png" alt="starUp">

        <div id="usersignupForm">

            <form name="signupForm"
            method="post"
            netlify
            data-netlify-recaptcha="true">

            <div id="inputs">
                <div id="email_Holder" class="input">
                    <label for="email">email</label>
                    <input type="email" name="email" id="email" required>
                </div>

                <div id="username_Holder" class="input">
                    <label for="username">username</label>
                    <input type="text" name="username" id="username" required>
                </div>

                <div id="password_Holder" class="input">
                    <label for="password">password</label>
                    <input type="password" name="password" id="password" required>
                </div>

                <div id="confirmpassword_Holder" class="input">
                    <label for="confirmpassword">confirm password</label>
                    <input type="password" name="password" id="confirmpassword" required>
                </div>
            </div>
            <div class="bottomButtons">
                <a href="index.html">already a member? login</a>
                <button type="submit">signup</button>
            </div>
            </form>

        </div>
    </div>
</body>
</html>
